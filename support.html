<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | Swift COD Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-[#09090b] text-zinc-400 antialiased min-h-screen flex items-center justify-center py-12 px-4">
    
    <div class="max-w-4xl w-full bg-[#18181b] border border-white/5 rounded-2xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
        
        <div class="w-full md:w-5/12 bg-zinc-900/50 p-8 md:p-10 border-b md:border-b-0 md:border-r border-white/5 flex flex-col justify-between">
            <div>
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-semibold tracking-wide uppercase mb-6 border border-emerald-500/20">
                    Support Center
                </div>
                <h1 class="text-3xl font-semibold text-white mb-3 tracking-tight">Get in touch</h1>
                <p class="text-sm text-zinc-400 mb-8 leading-relaxed">Need help configuring Swift COD? Experiencing an issue? Send us a message and our team will get back to you within 24 hours.</p>
            </div>
            
            <div class="pt-6 border-t border-white/5">
                <h3 class="text-xs font-semibold text-zinc-500 uppercase tracking-wider mb-2">Direct Email</h3>
                <a href="mailto:swiftcod.support@gmail.com" class="text-sm font-medium text-emerald-400 hover:text-emerald-300 transition-colors">swiftcod.support@gmail.com</a>
            </div>
        </div>

        <div class="w-full md:w-7/12 p-8 md:p-10">
            <form action="YOUR_FORMSPREE_LINK_HERE" method="POST" class="space-y-5">
                
                <div class="grid grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-zinc-300">First name</label>
                        <input type="text" name="First Name" required class="w-full bg-zinc-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium text-zinc-300">Last name</label>
                        <input type="text" name="Last Name" required class="w-full bg-zinc-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-medium text-zinc-300">Email address</label>
                    <input type="email" name="Email" required class="w-full bg-zinc-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-medium text-zinc-300">How can we help?</label>
                    <textarea name="Message" rows="4" required class="w-full bg-zinc-900 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 transition-all resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-white text-black hover:bg-zinc-200 font-medium text-sm rounded-lg px-4 py-2.5 mt-2 transition-colors duration-200">
                    Send message
                </button>
            </form>
        </div>

    </div>
</body>
</html>
